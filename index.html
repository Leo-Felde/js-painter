<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wiggly Canvas</title>

    <link rel="stylesheet" href="styles.css" />
    <!--  this is required for gif/animated export  -->
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <script src="palettes.js" defer></script>
    <script src="canvas.js" defer></script>
  </head>
  <body>
    <div id="main-wrapper">
      <div id="canvas-section">
        <canvas id="main-canvas" width="800" height="600"></canvas>
      </div>

      <div id="tools-section">
        <div id="buttons-wrapper">
          <div class="button-group">
            <button
              id="wiggle-btn"
              class="tool-btn active"
              title="Toggle wiggly mode"
            >
              Wiggle
            </button>
            <button id="pen-btn" class="tool-btn active" title="Pen mode">
              Pen
            </button>
            <button id="primary-color" class="color-btn">a</button>
            <button id="secondary-color" class="color-btn">b</button>
            <button id="tertiary-color" class="color-btn">c</button>
            <button id="eraser-btn" class="tool-btn" title="Eraser mode">
              Eraser
            </button>
          </div>

          <div class="button-group">
            <button id="undo-btn" class="tool-btn" title="Undo last stroke">
              Undo
            </button>
            <button
              id="nuke-btn"
              class="tool-btn danger"
              title="Clear everything"
            >
              Nuke
            </button>
          </div>
        </div>
      </div>

      <div id="bottom-section">
        <!-- Export Options -->
        <div class="button-group">
          <button id="export-png-btn">STATIC</button>
          <button id="export-gif-btn">ANIMATED</button>
          <button id="export-png-transparent-btn">TRANSPARENT</button>
        </div>
      </div>
    </div>
  </body>
</html>
